<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Links</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    
    .bookmarks-list {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .bookmark-item {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }
    
    .bookmark-icon {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-right: 12px;
      border-radius: 3px;
      display: block;
      object-fit: contain;
    }
    
    .separator {
      height: 1px;
      background: #444444;
      margin: 20px 0;
      position: relative;
    }
    
    .bookmark-item a {
      text-decoration: none;
      color: #e0e0e0;
      font-weight: 400;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
      display: inline-block;
    }
    
    .bookmark-item a:hover {
      color: #ffffff;
      text-decoration: underline;
    }
    
    .loading, .error, .no-results {
      text-align: center;
      padding: 40px;
      color: #888888;
      font-size: 16px;
    }
    
    .error {
      color: #ff6b6b;
    }
    
      </style>
</head>
<body>
  <div id="output"></div>
  <div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
    <button onclick="location.reload()" style="background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; cursor: pointer;">Оновити</button>
  </div>

  <script>
    const xmlFile = "bookmarks.xbel";
    const rawUrl = "https://raw.githubusercontent.com/andriizukr-a11y/Links1/main/bookmarks.xbel";

    let allBookmarks = [];

    // Парсинг XML та відображення закладок
    function parseAndDisplayBookmarks(xmlText) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");
      
      const bookmarks = xmlDoc.getElementsByTagName("bookmark");
      allBookmarks = [];
      
      for (let bookmark of bookmarks) {
        const href = bookmark.getAttribute("href");
        const title = bookmark.getElementsByTagName("title")[0]?.textContent || "Без назви";
        
        allBookmarks.push({ title, href });
      }
      
      displayBookmarks(allBookmarks);
    }

    // Відображення закладок
    function displayBookmarks(bookmarks) {
      const output = document.getElementById("output");
      
      if (bookmarks.length === 0) {
        output.innerHTML = '<div class="no-results">Закладки не знайдено</div>';
        return;
      }
      
      const bookmarksHTML = bookmarks.map(bookmark => {
        // Перевіряємо, чи це сепаратор
        if (bookmark.href.includes('separator.floccus.org')) {
          return `<div class="separator"></div>`;
        }
        
        return `
          <div class="bookmark-item">
            <img class="bookmark-icon" src="https://www.google.com/s2/favicons?domain=${new URL(bookmark.href).hostname}&sz=32" alt="" onerror="this.style.display='none'">
            <a href="${bookmark.href}" target="_blank">${escapeHtml(bookmark.title)}</a>
          </div>
        `;
      }).join('');
      
      output.innerHTML = `<div class="bookmarks-list">${bookmarksHTML}</div>`;
    }

    // Безпечне відображення HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Завантаження файлу
    function loadFile() {
      const output = document.getElementById("output");
      
      console.log('[DEBUG] Починаємо завантаження');
      console.log('[DEBUG] Protocol:', window.location.protocol);
      console.log('[DEBUG] Спроба завантажити:', xmlFile);
      
      // Спроба 1: локальний файл через XMLHttpRequest
      const xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        console.log('[DEBUG] XHR state:', xhr.readyState, 'status:', xhr.status);
        
        if (xhr.readyState === 4) {
          if (xhr.status === 200 || (xhr.status === 0 && xhr.responseText)) {
            console.log('[LOCAL] Завантажено локальний файл');
            console.log('[LOCAL] Довжина даних:', xhr.responseText.length);
            parseAndDisplayBookmarks(xhr.responseText);
          } else {
            console.log('[LOCAL] Не вдалося, переходимо на GitHub...');
            loadFromGitHub();
          }
        }
      };
      xhr.onerror = function() {
        console.log('[LOCAL] XHR error, переходимо на GitHub');
        loadFromGitHub();
      };
      
      const url = xmlFile + '?nocache=' + Date.now();
      console.log('[DEBUG] Відкриваю URL:', url);
      xhr.open('GET', url, true);
      xhr.send();
      
      // Завантаження з GitHub (прямо з raw URL)
      function loadFromGitHub() {
        console.log('[GITHUB] Завантажуємо з raw URL');
        const xhr2 = new XMLHttpRequest();
        xhr2.onreadystatechange = function() {
          if (xhr2.readyState === 4 && (xhr2.status === 200 || xhr2.status === 0)) {
            console.log('[GITHUB] Завантажено з GitHub');
            parseAndDisplayBookmarks(xhr2.responseText);
          } else if (xhr2.readyState === 4) {
            console.log('[GITHUB] Помилка:', xhr2.status);
            showError();
          }
        };
        xhr2.onerror = function() {
          console.log('[GITHUB] XHR error');
          showError();
        };
        
        // Унікальний URL для уникнення кешування
        const url = rawUrl + '?t=' + Date.now() + '&v=' + Math.random();
        console.log('[GITHUB] URL:', url);
        xhr2.open('GET', url, true);
        xhr2.send();
      }
      
      function showError() {
        output.innerHTML = '<div class="error">Помилка: Не вдалося завантажити bookmarks.xbel ні локально, ні з GitHub</div>';
      }
    }

    // Примусове перезавантаження без кешу
    function forceReload() {
      // Очищуємо кеш і перезавантажуємо
      window.location.href = window.location.href + '?nocache=' + Date.now();
    }

    // Запуск
    loadFile();
  </script>
</body>
</html>
