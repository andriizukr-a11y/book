<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Закладки з Google Drive</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    
    .bookmarks-list {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .bookmark-item {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }
    
    .bookmark-icon {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-right: 12px;
      border-radius: 3px;
      display: block;
      object-fit: contain;
    }
    
    .separator {
      height: 1px;
      background: #444444;
      margin: 20px 0;
      position: relative;
    }
    
    .bookmark-item a {
      text-decoration: none;
      color: #e0e0e0;
      font-weight: 400;
      font-size: 15px;
    }
    
    .bookmark-item a:hover {
      color: #ffffff;
      text-decoration: underline;
    }
    
    .loading, .error, .no-results {
      text-align: center;
      padding: 40px;
      color: #888888;
      font-size: 16px;
    }
    
    .error {
      color: #ff6b6b;
    }
    
      </style>
</head>
<body>
  <div id="output"></div>

  <script>
    const xmlFile = "bookmarks.xbel";
    const githubUrl = "https://raw.githubusercontent.com/andriizukr-a11y/Links1/main/bookmarks.xbel";
    const corsProxy = "https://api.allorigins.win/raw?url=";

    let allBookmarks = [];

    // Парсинг XML та відображення закладок
    function parseAndDisplayBookmarks(xmlText) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");
      
      const bookmarks = xmlDoc.getElementsByTagName("bookmark");
      allBookmarks = [];
      
      for (let bookmark of bookmarks) {
        const href = bookmark.getAttribute("href");
        const title = bookmark.getElementsByTagName("title")[0]?.textContent || "Без назви";
        
        allBookmarks.push({ title, href });
      }
      
      displayBookmarks(allBookmarks);
    }

    // Відображення закладок
    function displayBookmarks(bookmarks) {
      const output = document.getElementById("output");
      
      if (bookmarks.length === 0) {
        output.innerHTML = '<div class="no-results">Закладки не знайдено</div>';
        return;
      }
      
      const bookmarksHTML = bookmarks.map(bookmark => {
        // Перевіряємо, чи це сепаратор
        if (bookmark.href.includes('separator.floccus.org')) {
          return `<div class="separator"></div>`;
        }
        
        return `
          <div class="bookmark-item">
            <img class="bookmark-icon" src="https://www.google.com/s2/favicons?domain=${new URL(bookmark.href).hostname}&sz=32" alt="" onerror="this.style.display='none'">
            <a href="${bookmark.href}" target="_blank">${escapeHtml(bookmark.title)}</a>
          </div>
        `;
      }).join('');
      
      output.innerHTML = `<div class="bookmarks-list">${bookmarksHTML}</div>`;
    }

    // Безпечне відображення HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Завантаження файлу
    function loadFile() {
      const output = document.getElementById("output");
      
      // Спроба 1: локальний файл через XMLHttpRequest
      const xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200 || (xhr.status === 0 && xhr.responseText)) {
            parseAndDisplayBookmarks(xhr.responseText);
          } else {
            // Спроба 2: GitHub через CORS proxy
            loadFromGitHub();
          }
        }
      };
      xhr.onerror = function() {
        loadFromGitHub();
      };
      xhr.open('GET', xmlFile, true);
      xhr.send();
      
      // Завантаження з GitHub
      async function loadFromGitHub() {
        try {
          const response = await fetch(corsProxy + encodeURIComponent(githubUrl));
          if (response.ok) {
            const text = await response.text();
            parseAndDisplayBookmarks(text);
          } else {
            showError();
          }
        } catch (err) {
          showError();
        }
      }
      
      function showError() {
        output.innerHTML = '<div class="error">Помилка: Не вдалося завантажити bookmarks.xbel ні локально, ні з GitHub</div>';
      }
    }

    // Запуск
    loadFile();
  </script>
</body>
</html>
