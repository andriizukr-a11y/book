<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Links - Всі закладки</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      margin: 0;
      padding: 20px 40px 40px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Таби */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 30px;
      border-bottom: 2px solid #333;
      padding-bottom: 0;
      flex-wrap: wrap;
    }

    .tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      border-radius: 6px 6px 0 0;
      transition: all 0.2s;
      position: relative;
      top: 2px;
    }

    .tab:hover {
      color: #ccc;
      background: #252525;
    }

    .tab.active {
      color: #fff;
      background: #1a1a1a;
      border-bottom: 2px solid #4a9eff;
    }

    .tab-count {
      font-size: 12px;
      color: #666;
      margin-left: 6px;
    }

    .tab.active .tab-count {
      color: #4a9eff;
    }

    /* Контент табів */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .bookmarks-list {
      max-width: 700px;
      margin: 0 auto;
    }

    .bookmark-item {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }

    .bookmark-icon {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-right: 12px;
      border-radius: 3px;
      display: block;
      object-fit: contain;
    }

    .separator {
      height: 1px;
      background: #444444;
      margin: 20px 0;
      position: relative;
    }

    .bookmark-item a {
      text-decoration: none;
      color: #e0e0e0;
      font-weight: 400;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 600px;
      display: inline-block;
    }

    .bookmark-item a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .loading, .error, .no-results {
      text-align: center;
      padding: 40px;
      color: #888888;
      font-size: 16px;
    }

    .error {
      color: #ff6b6b;
    }

    /* Прелоадер - приховує сторінку поки все не завантажиться */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #preloader.hidden {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease-out, visibility 0.3s;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Прелоадер -->
  <div id="preloader"><div class="spinner"></div></div>

  <!-- Таби (генеруються динамічно) -->
  <div class="tabs" id="tabs-container"></div>

  <!-- Контент табів (генерується динамічно) -->
  <div id="contents-container"></div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ════════════════  НАЛАШТУВАННЯ  ═══════════════════════ -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <script>
    /* ============ НАЛАШТУВАННЯ ============ */

    // GitHub репозиторій і папка з файлами .xbel
    const CONFIG = {
      repo: 'andriizukr-a11y/Links1',  // змініть на свій репозиторій
      dir: 'bookmarks'                 // папка з файлами закладок
    };

    // НАЗВИ ТАБІВ: ім'я файлу (без .xbel) → гарна назва
    const TAB_NAMES = {
      'tab1': 'Спорт',
      'tab2': 'Різне'
      // Додавайте: 'work': 'Робота',
    };

    /* ============ КІНЕЦЬ НАЛАШТУВАНЬ ============ */

    let currentTab = null;
    const bookmarksData = {};
    let filesList = [];

    // Генерація ID з імені файлу (без .xbel)
    function fileId(filename) {
      return filename.replace(/\.xbel$/i, '').replace(/[^a-zA-Z0-9]/g, '_');
    }

    // Форматування імені табу
    function formatTabName(filename) {
      const baseName = filename.replace(/\.xbel$/i, '');
      // Використовуємо гарну назву якщо є, інакше ім'я файлу
      return TAB_NAMES[baseName] || baseName;
    }

    // Створення табів
    function createTabs(files) {
      const tabsContainer = document.getElementById('tabs-container');
      const contentsContainer = document.getElementById('contents-container');

      files.forEach((file, index) => {
        const id = fileId(file.name);
        const tabName = formatTabName(file.name);

        // Кнопка табу
        const tabBtn = document.createElement('button');
        tabBtn.className = 'tab' + (index === 0 ? ' active' : '');
        tabBtn.onclick = () => switchTab(id);
        tabBtn.innerHTML = `${tabName} <span class="tab-count" id="count-${id}">(0)</span>`;
        tabBtn.dataset.tabId = id;
        tabsContainer.appendChild(tabBtn);

        // Контент табу
        const content = document.createElement('div');
        content.id = `content-${id}`;
        content.className = 'tab-content' + (index === 0 ? ' active' : '');
        content.innerHTML = `<div id="output-${id}"></div>`;
        contentsContainer.appendChild(content);

        // Зберігаємо шлях до файлу
        bookmarksData[id] = { path: file.path, name: file.name };
      });

      if (files.length > 0) {
        currentTab = fileId(files[0].name);
      }

      // Відкриваємо таб з hash якщо є
      openTabFromHash();
    }

    // Перемикання табів
    function switchTab(tabId) {
      currentTab = tabId;

      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      document.querySelector(`[data-tab-id="${tabId}"]`).classList.add('active');
      document.getElementById(`content-${tabId}`).classList.add('active');

      // Оновлюємо URL hash
      window.location.hash = tabId;
    }

    // Відкрити таб з URL hash
    function openTabFromHash() {
      const hash = window.location.hash.replace('#', '');
      if (hash && document.querySelector(`[data-tab-id="${hash}"]`)) {
        switchTab(hash);
      }
    }

    // Парсинг XML
    function parseBookmarks(xmlText) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");
      const bookmarks = xmlDoc.getElementsByTagName("bookmark");
      const result = [];

      for (let bookmark of bookmarks) {
        const href = bookmark.getAttribute("href");
        const title = bookmark.getElementsByTagName("title")[0]?.textContent || "Без назви";
        result.push({ title, href });
      }

      return result;
    }

    // Відображення закладок
    function displayBookmarks(tabId, bookmarks) {
      const output = document.getElementById(`output-${tabId}`);
      const countEl = document.getElementById(`count-${tabId}`);

      const realBookmarks = bookmarks.filter(b => !b.href.includes('separator.floccus.org'));
      countEl.textContent = `(${realBookmarks.length})`;

      if (bookmarks.length === 0) {
        output.innerHTML = '<div class="no-results">Закладки не знайдено</div>';
        return;
      }

      const bookmarksHTML = bookmarks.map(bookmark => {
        if (bookmark.href.includes('separator.floccus.org')) {
          return `<div class="separator"></div>`;
        }

        try {
          const domain = new URL(bookmark.href).hostname;
          return `
            <div class="bookmark-item">
              <img class="bookmark-icon" src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" alt="" onerror="this.style.display='none'">
              <a href="${bookmark.href}" target="_blank">${escapeHtml(bookmark.title)}</a>
            </div>
          `;
        } catch {
          return `
            <div class="bookmark-item">
              <span style="margin-right: 12px;">🔗</span>
              <a href="${bookmark.href}" target="_blank">${escapeHtml(bookmark.title)}</a>
            </div>
          `;
        }
      }).join('');

      output.innerHTML = `<div class="bookmarks-list">${bookmarksHTML}</div>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Завантаження файлу (повертає дані, не рендерить)
    async function loadFileData(path) {
      const rawUrl = `https://raw.githubusercontent.com/${CONFIG.repo}/main/${path}`;
      try {
        const response = await fetch(rawUrl + '?t=' + Date.now());
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const text = await response.text();
        return parseBookmarks(text);
      } catch (err) {
        return []; // Порожній список при помилці
      }
    }

    // Отримання списку файлів з директорії
    async function loadDirectory() {
      const tabsContainer = document.getElementById('tabs-container');
      const apiUrl = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.dir}`;

      try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const data = await response.json();

        // Фільтруємо тільки .xbel файли
        const xbelFiles = data.filter(item => item.type === 'file' && item.name.endsWith('.xbel'));

        if (xbelFiles.length === 0) {
          tabsContainer.innerHTML = '<div class="error">Не знайдено .xbel файлів у директорії bookmarks/</div>';
          document.getElementById('preloader').classList.add('hidden');
          return;
        }

        // Завантажуємо ВСІ файли перед показом
        const loadedData = {};
        await Promise.all(xbelFiles.map(async (file) => {
          const id = fileId(file.name);
          const bookmarks = await loadFileData(file.path);
          loadedData[id] = bookmarks;
        }));

        // Тепер створюємо таби і показуємо все
        filesList = xbelFiles;
        tabsContainer.innerHTML = '';
        createTabs(xbelFiles);

        // Відображаємо завантажені дані
        Object.keys(loadedData).forEach(tabId => {
          bookmarksData[tabId] = bookmarksData[tabId] || {};
          bookmarksData[tabId].bookmarks = loadedData[tabId];
          displayBookmarks(tabId, loadedData[tabId]);
        });

        // Приховуємо прелоадер - все готово
        document.getElementById('preloader').classList.add('hidden');

      } catch (err) {
        tabsContainer.innerHTML = `<div class="error">Помилка завантаження директорії: ${err.message}</div>`;
        document.getElementById('preloader').classList.add('hidden');
      }
    }

    // Слухаємо зміни hash (кнопки назад/вперед)
    window.addEventListener('hashchange', openTabFromHash);

    // Запуск
    loadDirectory();
  </script>
</body>
</html>
