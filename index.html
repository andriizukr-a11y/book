<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <style>
    :root{--bg-primary:#1a1a1a;--border:#333333;--accent:#5b9cf5}
    body{background:var(--bg-primary);margin:0}
    #preloader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-primary);z-index:9999;display:flex;align-items:center;justify-content:center}
    #preloader.hidden{opacity:0;visibility:hidden;transition:opacity .3s ease-out,visibility .3s}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="preloader"><div class="spinner"></div></div>
  <script src="main.js"></script>
</body>
</html>
