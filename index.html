<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Links - Всі закладки</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      margin: 0;
      padding: 20px 40px 40px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Таби */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 30px;
      border-bottom: 2px solid #333;
      padding-bottom: 0;
    }

    .tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      border-radius: 6px 6px 0 0;
      transition: all 0.2s;
      position: relative;
      top: 2px;
    }

    .tab:hover {
      color: #ccc;
      background: #252525;
    }

    .tab.active {
      color: #fff;
      background: #1a1a1a;
      border-bottom: 2px solid #4a9eff;
    }

    .tab-count {
      font-size: 12px;
      color: #666;
      margin-left: 6px;
    }

    .tab.active .tab-count {
      color: #4a9eff;
    }

    /* Контент табів */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .bookmarks-list {
      max-width: 700px;
      margin: 0 auto;
    }

    .bookmark-item {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }

    .bookmark-icon {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-right: 12px;
      border-radius: 3px;
      display: block;
      object-fit: contain;
    }

    .separator {
      height: 1px;
      background: #444444;
      margin: 20px 0;
      position: relative;
    }

    .bookmark-item a {
      text-decoration: none;
      color: #e0e0e0;
      font-weight: 400;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 600px;
      display: inline-block;
    }

    .bookmark-item a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .loading, .error, .no-results {
      text-align: center;
      padding: 40px;
      color: #888888;
      font-size: 16px;
    }

    .error {
      color: #ff6b6b;
    }

    /* Кнопки дій */
    .actions {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }

    .btn {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #444;
      border-color: #666;
    }

    .btn-primary {
      background: #4a9eff;
      border-color: #4a9eff;
    }

    .btn-primary:hover {
      background: #3a8eef;
    }

    /* Заголовок секції */
    .section-title {
      font-size: 14px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>
  <!-- Таби -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('links1')">
      Спорт <span class="tab-count" id="count-links1">(0)</span>
    </button>
    <button class="tab" onclick="switchTab('links2')">
      Різне <span class="tab-count" id="count-links2">(0)</span>
    </button>
  </div>

  <!-- Контент -->
  <div id="content-links1" class="tab-content active">
    <div class="section-title">Закладки спорту та вправ</div>
    <div id="output-links1"></div>
  </div>

  <div id="content-links2" class="tab-content">
    <div class="section-title">Фільми, серіали та інше</div>
    <div id="output-links2"></div>
  </div>

  <!-- Кнопки -->
  <div class="actions">
    <button class="btn" onclick="editCurrent()">Редагувати</button>
    <button class="btn btn-primary" onclick="location.reload()">Оновити</button>
  </div>

  <script>
    const PROJECTS = {
      links1: {
        name: 'Спорт',
        repo: 'andriizukr-a11y/Links1',
        path: 'links1/bookmarks.xbel'
      },
      links2: {
        name: 'Різне',
        repo: 'andriizukr-a11y/Links2',
        path: 'links1/bookmarks.xbel'
      }
    };

    let currentTab = 'links1';
    const bookmarksData = {};

    // Перемикання табів
    function switchTab(project) {
      currentTab = project;

      // Оновлюємо активний таб
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      event.target.classList.add('active');
      document.getElementById(`content-${project}`).classList.add('active');
    }

    // Відкрити редагування поточного файлу
    function editCurrent() {
      const project = PROJECTS[currentTab];
      const editUrl = `https://github.com/${project.repo}/edit/main/${project.path}`;
      window.open(editUrl, '_blank');
    }

    // Парсинг XML
    function parseBookmarks(xmlText) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");
      const bookmarks = xmlDoc.getElementsByTagName("bookmark");
      const result = [];

      for (let bookmark of bookmarks) {
        const href = bookmark.getAttribute("href");
        const title = bookmark.getElementsByTagName("title")[0]?.textContent || "Без назви";
        result.push({ title, href });
      }

      return result;
    }

    // Відображення закладок
    function displayBookmarks(project, bookmarks) {
      const output = document.getElementById(`output-${project}`);
      const countEl = document.getElementById(`count-${project}`);

      // Фільтруємо сепаратори для підрахунку
      const realBookmarks = bookmarks.filter(b => !b.href.includes('separator.floccus.org'));
      countEl.textContent = `(${realBookmarks.length})`;

      if (bookmarks.length === 0) {
        output.innerHTML = '<div class="no-results">Закладки не знайдено</div>';
        return;
      }

      const bookmarksHTML = bookmarks.map(bookmark => {
        if (bookmark.href.includes('separator.floccus.org')) {
          return `<div class="separator"></div>`;
        }

        try {
          const domain = new URL(bookmark.href).hostname;
          return `
            <div class="bookmark-item">
              <img class="bookmark-icon" src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" alt="" onerror="this.style.display='none'">
              <a href="${bookmark.href}" target="_blank">${escapeHtml(bookmark.title)}</a>
            </div>
          `;
        } catch {
          return `
            <div class="bookmark-item">
              <span style="margin-right: 12px;">🔗</span>
              <a href="${bookmark.href}" target="_blank">${escapeHtml(bookmark.title)}</a>
            </div>
          `;
        }
      }).join('');

      output.innerHTML = `<div class="bookmarks-list">${bookmarksHTML}</div>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Завантаження файлу з GitHub
    async function loadProject(project) {
      const output = document.getElementById(`output-${project}`);
      output.innerHTML = '<div class="loading">Завантаження...</div>';

      const p = PROJECTS[project];
      const rawUrl = `https://raw.githubusercontent.com/${p.repo}/main/${p.path}`;

      try {
        const response = await fetch(rawUrl + '?t=' + Date.now());
        if (response.ok) {
          const text = await response.text();
          bookmarksData[project] = parseBookmarks(text);
          displayBookmarks(project, bookmarksData[project]);
        } else {
          throw new Error('HTTP ' + response.status);
        }
      } catch (err) {
        output.innerHTML = `<div class="error">Помилка завантаження: ${err.message}<br><a href="${rawUrl}" target="_blank" style="color:#4a9eff;">Перевірити файл</a></div>`;
      }
    }

    // Завантажуємо всі проєкти
    function loadAll() {
      Object.keys(PROJECTS).forEach(project => loadProject(project));
    }

    // Запуск
    loadAll();
  </script>
</body>
</html>
